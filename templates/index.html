<html>
    <head>
        <title>🕮 Books</title>
        <script type="text/javascript" src="/static/main.js"></script>
        <link href="/static/main.css" rel="stylesheet">
    </head>
    <body>
        <h1>⊹₊˚‧︵‿₊୨ Read Book List ୧₊‿︵‧˚₊⊹</h1>
        <form>
            <h2>Add New Book</h2>
            <div>
                <label for="add_author">Book Author</label>
                <input type="text" name="add_author" id="add_author">
                
            </div>
            <div>
                <label for="add_name">Book Title</label>
                <input type="text" name="add_name" id="add_name">
                
            </div>
            <div>
                <button onClick="addBook()">Add</button>
            </div>
            
        </form>

        <ul>
            {% for book in book_list %}
            <li>
                {{ book['author'] }} — 
                <i>"{{ book['name'] }}"</i>
                <button value="{{book['id']}}" onClick="deleteBook(this)">Delete</button>
            </li>
            
            {% endfor %}
        </ul>

    </body>
</html>
